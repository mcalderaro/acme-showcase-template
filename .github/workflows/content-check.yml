name: Content Check

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check for forbidden strings
        run: |
          ! grep -R -n -E "(OPENAI_API_KEY|ANTHROPIC_API_KEY|sk-[A-Za-z0-9]|token=)" . \
            --exclude-dir=.git \
            --exclude=content-check.yml \
            --exclude=pages.yml
